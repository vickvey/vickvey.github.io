<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Interactive Portfolio</title>
    <style>
        /* Your existing styles here */
        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Your Name</h1>
        <p>Web Developer</p>
    </header>

    <section>
        <h2>About Me</h2>
        <p>This is where you can introduce yourself and talk about your skills and experience.</p>
    </section>

    <section id="portfolio">
        <h2>Portfolio</h2>
        <!-- Add your projects and their descriptions here -->
        <!-- Example:
        <h3>Project Title</h3>
        <p>Description of the project goes here.</p>
        -->
    </section>

    <section>
        <h2>Contact</h2>
        <p>You can reach me at your.email@example.com</p>
    </section>

    <button id="changeContentButton">Click me to change content!</button>

    <footer>
        <p>&copy; 2024 Your Name - Portfolio</p>
    </footer>

    <script>
        // JavaScript for interactive features
        document.getElementById('changeContentButton').addEventListener('click', function() {
            // Change the content of the Portfolio section when the button is clicked
            document.getElementById('portfolio').innerHTML = `
                <h2>New Portfolio Section</h2>
                <p>This is the dynamically updated content of the portfolio section.</p>
                <p>You can add more information about your latest projects here.</p>
            `;
        });
    </script>
</body>
</html>
